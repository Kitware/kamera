network:  version: 2  ethernets:    # IR Camera - outer mobo (onboard, 1G, e1000e)    ir_cam:      match:        macaddress: 78:d0:04:39:f9:69      set-name: ir_cam      dhcp4: false      dhcp6: false      addresses: [192.168.1.10/24]      optional: true    # LAN - inner mobo (2.5G, igc)    lan:      match:        macaddress: 78:d0:04:39:f9:6a      set-name: lan      dhcp4: false      dhcp6: false      addresses:        - 192.168.88.10/24      routes:        - to: default          via: 192.168.88.1      nameservers:        addresses: [8.8.8.8, 192.168.88.10]      optional: true    # P1 Camera - PCIe f0 (10G, i40e)    p1_cam:      match:        macaddress: f0:b2:b9:3f:68:a4      set-name: p1_cam      mtu: 9000      dhcp4: false      dhcp6: false      addresses: [192.168.4.10/24]      optional: true    # UV Camera - PCIe f1 (i40e, 1G link but on 10G)    uv_cam:      match:        macaddress: f0:b2:b9:3f:68:a5      set-name: uv_cam      dhcp4: false      dhcp6: false      addresses: [192.168.2.10/24]      optional: true    # NAS - PCIe f3 (10G, i40e)    nas:      match:        macaddress: f0:b2:b9:3f:68:a7      set-name: nas      mtu: 9000      dhcp4: false      dhcp6: false      addresses: [192.168.198.100/24]      optional: true    # PCIe f2 (f0:b2:b9:3f:68:a6) unused - no connection