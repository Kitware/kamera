network:  version: 2  ethernets:    # IR Camera - outer mobo (onboard, 1G, e1000e)    ir_cam:      match:        macaddress: 78:d0:04:39:cf:95      set-name: ir_cam      dhcp4: false      dhcp6: false      addresses: [192.168.1.11/24]      optional: true    # LAN - inner mobo (2.5G, igc)    lan:      match:        macaddress: 78:d0:04:39:cf:96      set-name: lan      dhcp4: false      dhcp6: false      addresses:        - 192.168.88.11/24      routes:        - to: default          via: 192.168.88.1      nameservers:        addresses: [8.8.8.8, 192.168.88.10]      optional: true    # P1 Camera - PCIe f0 (10G, i40e)    p1_cam:      match:        macaddress: f0:b2:b9:3f:68:54      set-name: p1_cam      mtu: 9000      dhcp4: false      dhcp6: false      addresses: [192.168.4.11/24]      optional: true    # UV Camera - PCIe f1 (i40e, currently 1G link)    uv_cam:      match:        macaddress: f0:b2:b9:3f:68:55      set-name: uv_cam      dhcp4: false      dhcp6: false      addresses: [192.168.2.11/24]      optional: true    # NAS - PCIe f3 (10G, i40e)    nas:      match:        macaddress: f0:b2:b9:3f:68:57      set-name: nas      mtu: 9000      dhcp4: false      dhcp6: false      addresses: [192.168.198.101/24]      optional: true    # PCIe f2 (f0:b2:b9:3f:68:56) unused - no carrier. Add a stanza here if needed.