---network:  version: 2  ethernets:    # IR Camera - outer mobo    enp0s31f6:      addresses: [192.168.1.10/24]      optional: true    # LAN - inner MOBO    enp2s0:      addresses:        - 192.168.88.10/24      routes:        - to: default          via: 192.168.88.1      nameservers:        addresses: [8.8.8.8, 192.168.88.10]      optional: true    # P1 Camera - PCIE 0    enp3s0f0np0:      mtu: 9000      addresses: [192.168.4.10/24]      optional: true    # UV Camera - PCIE 1    enp3s0f1np1:      addresses: [192.168.2.10/24]      optional: true    # NAS - PCIE 3    enp3s0f3np3:      mtu: 9000      addresses: [192.168.198.100/24]      optional: true...