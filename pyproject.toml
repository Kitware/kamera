[project]
name = "kamera"
version = "0.1.0"
description = "KAMERA: Kitware's Image Acquisition ManagER and Archiver"
authors = [
    { name = "Adam Romlein", email = "adam.romlein@kitware.com" },
]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=2.1.1",
    "scipy>=1.14.1",
    "matplotlib>=3.9.2",
    "opencv-python>=4.10.0.84",
    "pillow>=10.4.0",
    "pyyaml>=6.0.2",
    "datetime>=5.5",
    "exifread>=3.0.0",
    "pygeodesy>=24.9.29",
    "pyshp>=2.3.1",
    "simplekml>=1.3.6",
    "shapely>=2.0.6",
    "transformations>=2024.5.24",
    "scriptconfig>=0.8.0",
    "ubelt>=1.3.6",
    "rich>=13.9.1",
    "gdal @ https://github.com/girder/large_image_wheels/raw/wheelhouse/GDAL-3.10.1-cp310-cp310-manylinux_2_17_x86_64.manylinux2014_x86_64.whl#sha256=4a09086631d81808a97c8c7a605aa6230ca045874aa688863cf91794e94880c7 ; python_version >= '3.10' and python_version < '3.11'",
    "gdal @ https://github.com/girder/large_image_wheels/raw/wheelhouse/GDAL-3.10.1-cp311-cp311-manylinux_2_17_x86_64.manylinux2014_x86_64.whl#sha256=aee8c49c3528b8613ad3fe14a9d0066ad6990e143f277aff5be1143f371258a2 ; python_version >= '3.11' and python_version < '3.12'",
    "gdal @ https://github.com/girder/large_image_wheels/raw/wheelhouse/GDAL-3.10.1-cp312-cp312-manylinux_2_17_x86_64.manylinux2014_x86_64.whl#sha256=19cd80ad4bd684e8c7a3f712e5a1c284cce59e5750155f0db0c31d875d3c6321 ; python_version >= '3.12' and python_version < '3.13'",
]

[dependency-groups]
dev = [
    "ipdb>=0.13.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["kamera"]
