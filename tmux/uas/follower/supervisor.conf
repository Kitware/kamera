[program:core]
command=/bin/bash %(ENV_KAMERA_DIR)s/tmux/uas/follower/00_start_core.sh
user=user
autostart=true

[program:sensors]
command=/bin/bash %(ENV_KAMERA_DIR)s/tmux/uas/follower/01_start_sensors.sh
user=user
autostart=true

[program:processing]
command=/bin/bash %(ENV_KAMERA_DIR)s/tmux/uas/follower/02_start_processing.sh
user=user
autostart=true

[program:timesync]
command=/bin/bash %(ENV_KAMERA_DIR)s/tmux/uas/follower/03_run_clock_sync.sh
user=root
autostart=true

[program:camptp]
command=/bin/bash %(ENV_KAMERA_DIR)s/tmux/uas/follower/04_run_cam_ptp.sh
user=root
autostart=true

[program:docker]
command=/bin/bash %(ENV_KAMERA_DIR)s/tmux/uas/follower/05_start_docker.sh
user=root
autostart=true

[group:uas]
programs=core,sensors,processing
