# Conda environment providing the binary geo/SfM stack (GDAL, pycolmap) that
# has no reliable cross-platform wheels. The project itself is installed by uv into
# a venv created on top of this env with --system-site-packages, so python
# here must satisfy requires-python in pyproject.toml.
# Setup: `conda env create -f environment.yml && conda activate kamera`,
# then `make install` (see README.md for the Windows equivalent).
name: kamera
channels:
  - conda-forge
dependencies:
  - python=3.10  # must match PYTHON_VERSION in the Makefile
  - gdal>=3.10
  - pycolmap>=4.0
  - pip
  - uv
